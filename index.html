<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Mently — graf vizual de cunoștințe care transformă notițele fragmentate într-o hartă mentală vie." />
  <meta name="theme-color" content="#0c0a09" />
  <title>Mently — Graf vizual de cunoștințe</title>

  <!--
    SECURITATE — HEADERE HARDENING (Cap. V):
    Content-Security-Policy restricționează ce poate fi încărcat/executat în pagină.
    Chiar dacă apare un XSS, atacatorul nu poate încărca scripturi de pe alte domenii.

    DECIZII EXPLICITE:
      • script-src 'self' STRICT (fără 'unsafe-inline'): toate componentele folosesc
         addEventListener + delegare pe data-action — zero handlers inline. Un XSS
         reușit nu poate executa nici script inline, nici script extern.
      • 'unsafe-eval' ELIMINAT: Tailwind CDN (care folosea JIT via Function()) a fost
         înlocuit cu tailwind.css compilat static — CSP mai strict, zero request extern.
      • style-src păstrează 'unsafe-inline' pentru atribute style="" din template-uri
         (risc minor: CSS injection ≠ execuție de cod).
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: blob:;
    connect-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />
  <!--
    NOTĂ: frame-ancestors funcționează doar ca HTTP response header (nu via meta) —
    e setat în vercel.json împreună cu întregul CSP dublat ca header HTTP.
    Meta-ul de mai sus rămâne ca defense-in-depth pentru rulare locală (file:// / static server).
  -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Favicon inline (SVG data-URI) — zero requests HTTP, on-brand -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c0a09'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-size='22' fill='%23fb923c'%3EM%3C/text%3E%3C/svg%3E" />

  <link rel="stylesheet" href="./tailwind.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./style.css" />
</head>
<body class="font-sans bg-ink-950 text-paper-100 antialiased overflow-hidden">

  <!-- Skip link (WCAG 2.4.1) — primul focusable -->
  <a href="#canvas-wrapper" class="skip-link">Sari la graf</a>

  <div id="app" class="h-[100dvh] w-screen relative md:flex overflow-hidden" role="application" aria-label="Mently — graf vizual de cunoștințe">

    <!-- Hamburger (mobile only) -->
    <button
      id="drawer-open"
      type="button"
      class="md:hidden fixed top-3 left-3 z-40 bg-ink-900/90 backdrop-blur-md border border-ink-800 rounded-md p-2 text-paper-100 hover:text-signal-400 transition-colors shadow-lg shadow-black/40"
      aria-label="Deschide panoul de editare"
      aria-controls="sidebar"
      aria-expanded="false"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Backdrop (mobile drawer overlay) -->
    <div
      id="drawer-backdrop"
      class="fixed inset-0 z-30 bg-black/70 backdrop-blur-sm md:hidden opacity-0 pointer-events-none transition-opacity duration-300"
      aria-hidden="true"
    ></div>

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="mently-sidebar fixed md:relative md:flex-shrink-0 inset-y-0 left-0 z-40 w-[88vw] max-w-[400px] md:w-[clamp(320px,30vw,460px)] md:max-w-none bg-ink-900/95 md:bg-ink-900/60 backdrop-blur-md border-r border-ink-800 overflow-hidden"
      aria-label="Editor de notițe"
      aria-hidden="true"
    >
      <!-- Conținut injectat de ui.js -->
    </aside>

    <!-- Canvas -->
    <main
      id="canvas-wrapper"
      class="absolute inset-0 md:relative md:flex-1 md:inset-auto md:h-full bg-ink-950"
      aria-label="Vizualizarea grafului de cunoștințe"
      tabindex="-1"
    >
      <canvas id="graph-canvas" class="absolute inset-0 w-full h-full" aria-hidden="true"></canvas>

      <!-- Canvas controls: sidebar toggle + fullscreen toggle (desktop only) -->
      <div id="canvas-controls" role="toolbar" aria-label="Controale vizualizare">
        <button
          id="sidebar-toggle"
          type="button"
          class="canvas-ctrl-btn"
          aria-label="Închide bara laterală"
          aria-controls="sidebar"
          aria-expanded="true"
        >
          <!-- icon-collapse (sidebar open state) -->
          <svg data-icon="collapse" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <polyline points="5 8 3 10 5 12"/>
          </svg>
          <!-- icon-expand (sidebar closed state) -->
          <svg data-icon="expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <polyline points="13 8 15 10 13 12"/>
          </svg>
        </button>

        <button id="zoom-in" type="button" class="canvas-ctrl-btn" aria-label="Mărește">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="zoom-out" type="button" class="canvas-ctrl-btn" aria-label="Micșorează">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="zoom-reset" type="button" class="canvas-ctrl-btn" aria-label="Resetează vizualizarea">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>

        <button
          id="fullscreen-toggle"
          type="button"
          class="canvas-ctrl-btn"
          aria-label="Mod ecran complet"
          aria-pressed="false"
        >
          <!-- icon-enter-fullscreen -->
          <svg data-icon="enter" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <!-- icon-exit-fullscreen -->
          <svg data-icon="exit" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <polyline points="4 14 10 14 10 20"/>
            <polyline points="20 10 14 10 14 4"/>
            <line x1="10" y1="14" x2="3" y2="21"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
          </svg>
        </button>
      </div>
      <div class="pointer-events-none absolute inset-0 bg-grain opacity-[0.04]"></div>
      <div class="pointer-events-none absolute inset-0 bg-vignette"></div>

      <div id="canvas-placeholder" class="absolute inset-0 flex items-center justify-center text-center px-6 pointer-events-none">
        <!-- animate-float definit în style.css — levitație lentă, dezactivat la prefers-reduced-motion -->
        <div class="max-w-md animate-float">
          <p class="font-display italic text-5xl text-paper-300/35 leading-tight tracking-tight">Nicio conexiune<br/>încă.</p>
          <p class="mt-5 text-sm text-paper-500/50 tracking-wide">Adaugă notițe cu tag-uri comune — conexiunile apar automat.</p>
        </div>
      </div>
    </main>
  </div>

  <div id="aria-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
