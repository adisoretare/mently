<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Mently — visual knowledge graph care transformă notițele fragmentate într-o hartă mentală vie." />
  <meta name="theme-color" content="#0c0a09" />
  <title>Mently — Visual Knowledge Graph</title>

  <!-- Favicon inline (SVG data-URI) — zero requests HTTP, on-brand cu paleta amber/ink -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c0a09'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-size='22' fill='%23fb923c'%3EM%3C/text%3E%3C/svg%3E" />

  <!--
    DECIZIE ARHITECTURALĂ (Cap. I — Inginerie web):
    Tailwind CDN pentru viteza de dezvoltare. Producția → PostCSS + JIT.
    Configurăm tema brand ÎNAINTE de a încărca scriptul.
  -->
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Instrument Serif"', 'ui-serif', 'Georgia', 'serif'],
            sans:    ['"Geist"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono:    ['"Geist Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          colors: {
            ink:    { 950: '#0c0a09', 900: '#1c1917', 800: '#292524', 700: '#44403c' },
            paper:  { 100: '#fafaf9', 300: '#d6d3d1', 500: '#a8a29e' },
            signal: { 400: '#fb923c', 300: '#fdba74', 500: '#f97316' },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./style.css" />
</head>
<body class="font-sans bg-ink-950 text-paper-100 antialiased overflow-hidden">

  <!-- Skip link (accesibilitate WCAG 2.4.1) — vizibil doar la focus prin Tab -->
  <a href="#canvas-wrapper" class="skip-link">Sari la graf</a>

  <!--
    LAYOUT
    Desktop ≥768px: sidebar + canvas în flex row (sidebar fix-width, canvas flex-1).
    Mobile <768px:  canvas full-screen; sidebar = drawer fix poziționat off-screen,
                    deschis prin butonul hamburger.
  -->
  <div id="app" class="h-[100dvh] w-screen relative md:flex overflow-hidden" role="application" aria-label="Mently — visual knowledge graph">

    <!-- Hamburger button (mobile only) -->
    <button
      id="drawer-open"
      type="button"
      class="md:hidden fixed top-3 left-3 z-40 bg-ink-900/90 backdrop-blur-md border border-ink-800 rounded-md p-2 text-paper-100 hover:text-signal-400 transition-colors shadow-lg shadow-black/40"
      aria-label="Deschide panoul de editare"
      aria-controls="sidebar"
      aria-expanded="false"
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Backdrop (mobile only, visible doar când drawer e deschis) -->
    <div
      id="drawer-backdrop"
      class="fixed inset-0 z-30 bg-black/70 backdrop-blur-sm md:hidden opacity-0 pointer-events-none transition-opacity duration-300"
      aria-hidden="true"
    ></div>

    <!--
      SIDEBAR
      - Desktop: relative, parte din flex-row layout
      - Mobile:  fixed, translateX(-100%) by default; .is-open îl aduce în vizualizare
    -->
    <aside
      id="sidebar"
      class="mently-sidebar fixed md:relative md:flex-shrink-0 inset-y-0 left-0 z-40 w-[88vw] max-w-[400px] md:w-[clamp(320px,30vw,460px)] md:max-w-none bg-ink-900/95 md:bg-ink-900/60 backdrop-blur-md border-r border-ink-800 overflow-hidden"
      aria-label="Editor de notițe"
      aria-hidden="true"
    >
      <!-- Conținut injectat de ui.js -->
    </aside>

    <!-- Canvas / Main -->
    <main
      id="canvas-wrapper"
      class="absolute inset-0 md:relative md:flex-1 md:inset-auto md:h-full bg-ink-950"
      aria-label="Vizualizarea grafului de cunoștințe"
      tabindex="-1"
    >
      <canvas id="graph-canvas" class="absolute inset-0 w-full h-full" aria-hidden="true"></canvas>

      <!-- Texturi de fundal -->
      <div class="pointer-events-none absolute inset-0 bg-grain opacity-[0.04]"></div>
      <div class="pointer-events-none absolute inset-0 bg-vignette"></div>

      <!-- Placeholder canvas (eliminat când există notițe) -->
      <div id="canvas-placeholder" class="absolute inset-0 flex items-center justify-center text-center px-6 pointer-events-none">
        <div class="max-w-md">
          <p class="font-display italic text-5xl text-paper-300/40 leading-tight">A blank<br/>constellation.</p>
          <p class="mt-4 text-sm text-paper-500/60">Adaugă o notiță în panou — graful se construiește din tag-urile comune.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ARIA live region pentru screen-reader announcements -->
  <div id="aria-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!-- Entry point -->
  <script type="module" src="./main.js"></script>
</body>
</html>
